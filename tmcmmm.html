<!DOCTYPE html> <html> <head> <title>TmCmMm</title> <meta name="robots" content="noindex, nofollow"> <meta charset="UTF-8"> <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.2/jquery.min.js"></script> <style>body,button,input,select{font-family:Verdena,'Microsoft JhengHei'}h3{width:30%;color:#0c64a7;font-weight:400;border-bottom:double 3px #666}select{font-size:16px;color:#00f;margin-right:20px}span{font-size:15px}input{font-size:16px;width:100px;margin-right:20px}button{color:#000;background-color:#eee;border:solid 1px #333;font-size:16px;padding:3px 8px}button:hover{color:#00f;background-color:#fff;cursor:pointer;border:solid 1px #333}button.btn-delcss:hover{color:red;background-color:#fff;cursor:pointer;border:solid 1px #333}table{font-size:16px;width:100%}th,tr{border-top:1px solid #666;border-bottom:1px solid #666}td,tr{border-bottom:1px solid #ccc}tbody tr:hover{background-color:#fee}tbody td{color:#00f;text-align:center}tbody tr td:nth-child(even){color:green}tbody tr td:last-child{color:#000}small{font-size:14px;color:red}</style> </head> <body> <div style="margin:auto 50px"> <h2>單位換算試算</h2> <h3>資料計算結果列表</h3> <table> <thead> <tr> <th>項目</th> <th>長</th> <th>寬</th> <th>設長</th> <th>設寬</th> <th>設長整</th> <th>設寬整</th> <th>換長</th> <th>換寬</th> <th>計長</th> <th>計寬</th> <th>單位才數</th> <th>計算備註</th> <th>刪除</th> </tr> </thead> <tbody id="lstbody"> </tbody> </table> <hr> <br> <h3>新增資料</h3> <div> <span>輸入單位</span> <select id="calunit"> <option value="tm">台尺</option> <option value="cm">公分</option> <option value="cm918">公分(除918)</option> <option value="mm">公厘</option> </select> <span>換算模式</span> <select id="calmode"> <option value="s50">5吋計</option> <option value="s25">2吋半計</option> <option value="sreal">實才計</option> </select> <span>四捨五入<small>目前均以四捨五入計算</small></span> <select id="roundyn"> <option value="ry">四捨五入</option> <option value="rn">捨去尾數</option> </select> </div> <hr> <div> <span>項目</span> <input id="itemname" autofocus> <span>長</span> <input id="hlen"> <span>寬</span> <input id="wlen"> <button type="button" id="addrow">新增</button> </div> <div> </div></div></body> <script>function addRow(t,e,d){var n=$("#calunit").val(),a=$("#calmode").val(),o=($("#roundyn").val(),$("#calunit option:selected").text()),c=$("#calmode option:selected").text(),r=$("#roundyn option:selected").text(),l=o+" , "+c+" , "+r,i="no"+e+d+n+a,u=parseInt(e)||0,s=parseInt(d)||0;if("cm918"!=n)var v=convert2TM(n,u),m=convert2TM(n,s),f=Math.round(v),p=Math.round(m),h=calculateBaseUnits(a,f),w=calculateBaseUnits(a,p),y=divideBy100(h),M=divideBy100(w),x=y*M,F=Math.round(x);else var v=f=h=y="-",m=p=w=M="-",x=u*s/918,F=Math.round(x);var k='<button type="button" class="btn-delcss" onclick="deleteRow(\''+i+"')\">刪除</button>",B="<tr id="+i+"><td>"+t+"</td><td>"+u+"</td><td>"+s+"</td><td>"+v+"</td><td>"+m+"</td><td>"+f+"</td><td>"+p+"</td><td>"+h+"</td><td>"+w+"</td><td>"+y+"</td><td>"+M+"</td><td>"+F+" ("+x.toFixed(2)+")</td><td>"+l+"</td><td>"+k+"</td></tr>";$("#lstbody").append(B),$("#itemname, #hlen, #wlen").val(""),$("#itemname").focus()}function deleteRow(t){$("#"+t).remove()}function convert2TM(t,e){switch(t){case"cm":return parseFloat(3.3*e).toFixed(2);case"mm":return parseFloat(e/10*3.3).toFixed(2);default:return e}}function calculateBaseUnits(t,e){var d=100*Math.floor(e/100),n=e-d,a=100;switch(t){case"s50":return n>=0&&2>=n?a=0:n>=3&&19>=n?a=25:n>=20&&50>=n&&(a=50),d+a;case"s25":return n>=0&&2>=n?a=0:n>=3&&19>=n?a=25:n>=20&&50>=n?a=50:n>=51&&75>=n&&(a=75),d+a;default:return e}}function divideBy100(t){return parseFloat(t/100).toFixed(2)}$(document).keypress(function(t){var e=t.keyCode?t.keyCode:t.which;"13"==e&&$("#addrow").click()}),$("#addrow").click(function(){addRow($("#itemname").val(),$("#hlen").val(),$("#wlen").val())})</script> </html>
